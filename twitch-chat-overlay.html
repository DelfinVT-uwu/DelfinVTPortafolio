<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Delfin Chat</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Space+Grotesk:wght@400;500;700&family=Caveat:wght@600&display=swap" rel="stylesheet"><style>:root{--cobalt:#1f3df0;--cobalt-d:#1730b8;--purple:#7b2ff7;--purple-d:#5a1fc0;--sky:#dce6ff;--sky-soft:#eef3ff;--ink:#0c1330;--paper:#ffffff;--dim:#5b6280;--yellow:#ffd23f;--pink:#ff4d8d}*{margin:0;padding:0;box-sizing:border-box}body{background:transparent;font-family:'Space Grotesk',sans-serif;overflow:hidden;width:400px;padding:10px;color:var(--ink)}#c{display:flex;flex-direction:column;gap:12px;max-height:100vh;overflow:hidden}.m{opacity:0;animation:si .5s cubic-bezier(0.16,1,0.3,1) forwards;overflow:hidden}@keyframes si{from{opacity:0;transform:translateY(22px)scale(.97);filter:blur(2px)}to{opacity:1;transform:translateY(0)scale(1);filter:blur(0)}}.md{animation:so .65s cubic-bezier(.55,0,.45,1)forwards!important;pointer-events:none}@keyframes so{0%{opacity:1;transform:translateY(0)scale(1);filter:blur(0);max-height:200px;margin-bottom:0}35%{opacity:.9;transform:translateY(-6px)scale(.99);filter:blur(0)}70%{opacity:.25;transform:translateY(-26px)scale(.95);filter:blur(2px);max-height:200px;margin-bottom:0}100%{opacity:0;transform:translateY(-44px)scale(.92);filter:blur(3px);max-height:0;margin-bottom:-12px;padding:0}}.w{position:relative;background:var(--paper);border:2px solid var(--ink);box-shadow:5px 5px 0 var(--cobalt)}.w.v{box-shadow:5px 5px 0 var(--purple)}.w.s{box-shadow:5px 5px 0 var(--yellow);background:#fffef0}.b{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--ink);color:var(--paper);border-bottom:2px solid var(--ink);gap:8px}.b .f{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:lowercase;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.b .f b{color:var(--yellow)}.v .b .f b{color:var(--pink)}.s .b .f b{color:var(--yellow)}.b .d{display:flex;gap:4px;flex-shrink:0}.b .d i{width:8px;height:8px;border-radius:50%;background:var(--paper);opacity:.7}.b .d i:nth-child(1){background:#ff6b8a;opacity:1}.b .d i:nth-child(2){background:#ffd23f;opacity:1}.b .d i:nth-child(3){background:#5be37a;opacity:1}.o{position:relative;padding:10px 12px 11px;background:var(--paper)}.s .o{background:#fffef0}.o::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(31,61,240,.06)1px,transparent 1px),linear-gradient(90deg,rgba(31,61,240,.06)1px,transparent 1px);background-size:14px 14px;pointer-events:none;opacity:.7}.u{display:flex;align-items:center;gap:6px;margin-bottom:4px;position:relative;z-index:1}.n{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;color:var(--cobalt);letter-spacing:-.01em;line-height:1}.v .n{color:var(--purple)}.s .n{color:#a07a00}.t{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--paper);background:var(--ink);padding:2px 6px;margin-left:2px}.v .t{background:var(--purple)}.s .t{background:#a07a00}.g{font-size:13px;line-height:1;background:var(--yellow);border:1.5px solid var(--ink);padding:1px 4px}.v .g{background:var(--sky)}.s .g{background:#fff5b8}.k{display:inline-block;font-family:'Caveat',cursive;font-size:16px;font-weight:600;color:var(--purple);line-height:1;margin-left:auto;animation:sa 1.6s ease-in-out infinite}.v .k{color:var(--cobalt)}.s .k{color:#a07a00}@keyframes sa{0%,100%{transform:rotate(-8deg)scale(1);opacity:1}50%{transform:rotate(8deg)scale(1.15);opacity:.65}}.x{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:13.5px;line-height:1.45;color:var(--ink);letter-spacing:.005em;position:relative;z-index:1;word-wrap:break-word;word-break:break-word}.x a{color:var(--cobalt);text-decoration:underline}.e{height:1.5em;vertical-align:middle;margin:-2px 1px}.q{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:linear-gradient(135deg,transparent 50%,var(--ink)50%);pointer-events:none}</style></head><body><div id="c"></div><script>
(function(){'use strict'
var qs=new URLSearchParams(window.location.search);var CHANNEL=qs.get('channel')||'delfin_vt';var MAX_MESSAGES=5;var MSG_LIFETIME=25000;var BADGES_MAP={broadcaster:"🐬",moderator:"⚔",vip:"♦",subscriber:"★",premium:"♚",turbo:"⚡"};var TAGS_MAP={broadcaster:"host",moderator:"mod",vip:"vip",subscriber:"sub"};var msgCounter=0;var container=document.getElementById('c');var ws=null,wsReconnect=null;function connectIRC(){if(ws)try{ws.close()}catch(e){}ws=new WebSocket('wss://irc-ws.chat.twitch.tv:443');ws.onopen=function(){ws.send('PASS oauth:ANONYMOUS_ACCESS');ws.send('NICK justinfan'+Math.floor(Math.random()*99999));ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');ws.send('JOIN #'+CHANNEL)};ws.onmessage=function(e){var raw=e.data;if(raw.startsWith('PING')){ws.send('PONG :tmi.twitch.tv');return}if(!raw.includes('PRIVMSG'))return;var tags={};if(raw.startsWith('@')){raw.substring(1,raw.indexOf(' ')).split(';').forEach(function(t){var p=t.split('=');tags[p[0]]=p[1]})}var m=raw.match(/PRIVMSG #\S+ :(.+)/);if(!m)return;addMessage(tags['display-name']||tags['login']||'user',m[1].trim(),tags['badges']||'',tags['emotes'])};ws.onerror=function(){};ws.onclose=function(){clearTimeout(wsReconnect);wsReconnect=setTimeout(connectIRC,5000)}}function isHost(s){return s.split(',').some(function(b){return b.split('/')[0]==='broadcaster'})}function getBadges(s){return s.split(',').map(function(b){return BADGES_MAP[b.split('/')[0]]}).filter(Boolean)}function getUserTag(s){var p=['broadcaster','moderator','vip','subscriber'];var a=s.split(',').map(function(b){return b.split('/')[0]});for(var i=0;i<p.length;i++){if(a.indexOf(p[i])!==-1)return TAGS_MAP[p[i]]}return null}function parseEmotes(text,emotesStr){if(!emotesStr)return esc(text);var r=[];emotesStr.split('/').forEach(function(p){var parts=p.split(':');var id=parts[0];parts[1].split(',').forEach(function(pos){var se=pos.split('-');r.push({id:id,start:parseInt(se[0]),end:parseInt(se[1])})})});r.sort(function(a,b){return a.start-b.start});var chars=Array.from(text);var html='',pos=0;r.forEach(function(rr){if(rr.start>pos)html+=esc(chars.slice(pos,rr.start).join(''));html+='<img src="https://static-cdn.jtvnw.net/emoticons/v2/'+rr.id+'/default/dark/1.0" alt="" class="e">';pos=rr.end+1});if(pos<chars.length)html+=esc(chars.slice(pos).join(''));return html}function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}function addMessage(username,text,badgeStr,emotesStr){msgCounter++;var host=isHost(badgeStr||'');var isAlt=!host&&(msgCounter%2===0);var badges=getBadges(badgeStr||'');var tag=getUserTag(badgeStr||'');var varClass=host?'s':(isAlt?'v':'');var msgHtml=parseEmotes(text,emotesStr);var fileName='<b>'+esc(username).toLowerCase()+'</b>.msg';var el=document.createElement('div');el.className='m';el.innerHTML='<div class="w '+varClass+'"><div class="b"><span class="f">'+fileName+'</span><span class="d"><i></i><i></i><i></i></span></div><div class="o"><div class="u">'+badges.map(function(b){return'<span class="g">'+b+'</span>'}).join('')+'<span class="n">'+esc(username)+'</span>'+(tag?'<span class="t">'+tag+'</span>':'')+'<span class="k">✦</span></div><div class="x">'+msgHtml+'</div><div class="q"></div></div></div>';container.appendChild(el);trimMessages();el._timer=setTimeout(function(){removeMsg(el)},MSG_LIFETIME)}function removeMsg(el){if(!el||el.classList.contains('md'))return;clearTimeout(el._timer);var h=el.offsetHeight;el.style.maxHeight=h+'px';el.offsetHeight;el.classList.add('md');el.addEventListener('animationend',function(){el.remove()},{once:true})}function trimMessages(){var msgs=container.querySelectorAll('.m:not(.md)');var excess=msgs.length-MAX_MESSAGES;for(var i=0;i<excess;i++)removeMsg(msgs[i])}connectIRC();setTimeout(function(){if(container.children.length===0)addMessage('Delfin_VT','Stream en vivo ✦ bienvenidos','broadcaster/1')},3000)})();
</script></body></html>
