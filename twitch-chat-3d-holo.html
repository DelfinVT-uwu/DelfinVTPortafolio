bkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--cobalt);border:2px solid var(--ink);cursor:pointer}.solo-row input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--cobalt);border:2px solid var(--ink);cursor:pointer}hr.sep{border:none;border-top:2px solid var(--ink);margin:12px 0;position:relative}hr.sep::after{content:"✦";position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--paper);padding:0 6px;color:var(--purple);font-size:12px}.editor-btns{display:flex;gap:6px;margin-top:14px}.editor-btns button{flex:1;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:9px 0;cursor:pointer;border:2px solid var(--ink);background:var(--paper);color:var(--ink);transition:all .14s}.editor-btns button:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink);background:var(--sky)}.editor-btns button.save-btn{background:var(--ink);color:var(--paper)}.editor-btns button.save-btn:hover{background:var(--purple);border-color:var(--purple);box-shadow:3px 3px 0 var(--ink)}.editor-btns button.hide-btn{color:var(--dim);border-color:var(--dim)}.ed-tip{margin-top:10px;font-family:'Space Grotesk',sans-serif;font-size:9px;line-height:1.5;color:var(--dim);padding:7px 9px;background:var(--sky-soft);border-left:3px solid var(--purple)}.ed-tip b{color:var(--ink)}.ed-tip kbd{display:inline-block;background:var(--paper);border:1.5px solid var(--ink);padding:1px 5px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:9px;box-shadow:1.5px 1.5px 0 var(--ink);margin:0 1px}body.ui-hidden .corner-handle,body.ui-hidden #toggle-editor,body.ui-hidden #conn-status,body.ui-hidden #editor-panel{display:none!important}#toggle-editor{position:fixed;top:12px;right:12px;z-index:10003;width:36px;height:36px;background:var(--paper);border:2px solid var(--ink);color:var(--ink);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:3px 3px 0 var(--purple);transition:all .14s;user-select:none}#toggle-editor:hover{background:var(--yellow);transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--purple)}#toggle-editor.active{background:var(--purple);color:var(--paper);box-shadow:3px 3px 0 var(--ink)}#conn-status{position:fixed;top:12px;right:58px;z-index:10003;height:36px;padding:0 10px;display:flex;align-items:center;gap:6px;background:var(--paper);border:2px solid var(--ink);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);cursor:help;box-shadow:3px 3px 0 var(--cobalt);user-select:none}#conn-status .dot{width:9px;height:9px;border-radius:50%;background:var(--yellow);border:1.5px solid var(--ink)}#conn-status.ok .dot{background:#5be37a}#conn-status.fail .dot{background:var(--pink)}#chat-container{position:fixed;transform-origin:0 0;z-index:5;width:380px;padding:10px;display:flex;flex-direction:column;gap:12px;overflow:visible}.chat-message{opacity:0;animation:slideIn .5s cubic-bezier(0.16,1,0.3,1) forwards}@keyframes slideIn{from{opacity:0;transform:translateY(22px)scale(.97);filter:blur(2px)}to{opacity:1;transform:translateY(0)scale(1);filter:blur(0)}}.message-dying{animation:slideOutUp .65s cubic-bezier(.55,0,.45,1)forwards!important;pointer-events:none}@keyframes slideOutUp{0%{opacity:1;transform:translateY(0)scale(1);filter:blur(0);max-height:200px;margin-bottom:0}35%{opacity:.9;transform:translateY(-6px)scale(.99);filter:blur(0)}70%{opacity:.25;transform:translateY(-26px)scale(.95);filter:blur(2px);max-height:200px;margin-bottom:0}100%{opacity:0;transform:translateY(-44px)scale(.92);filter:blur(3px);max-height:0;margin-bottom:-12px;padding:0}}.chat-message{overflow:hidden}.msg-wrapper{position:relative;background:var(--paper);border:2px solid var(--ink);box-shadow:5px 5px 0 var(--cobalt)}.msg-wrapper.alt-variant{box-shadow:5px 5px 0 var(--purple)}.msg-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--ink);color:var(--paper);border-bottom:2px solid var(--ink);gap:8px}.msg-bar .file-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:lowercase;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.msg-bar .file-name b{color:var(--yellow)}.alt-variant .msg-bar .file-name b{color:var(--pink)}.msg-bar .dots{display:flex;gap:4px;flex-shrink:0}.msg-bar .dots i{width:8px;height:8px;border-radius:50%;background:var(--paper);opacity:.7}.msg-bar .dots i:nth-child(1){background:#ff6b8a;opacity:1}.msg-bar .dots i:nth-child(2){background:#ffd23f;opacity:1}.msg-bar .dots i:nth-child(3){background:#5be37a;opacity:1}.msg-body{position:relative;padding:10px 12px 11px;background:var(--paper)}.msg-body::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(31,61,240,.06)1px,transparent 1px),linear-gradient(90deg,rgba(31,61,240,.06)1px,transparent 1px);background-size:14px 14px;pointer-events:none;opacity:.7}.username-bar{display:flex;align-items:center;gap:6px;margin-bottom:4px;position:relative;z-index:1}.username{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;color:var(--cobalt);letter-spacing:-.01em;line-height:1}.alt-variant .username{color:var(--purple)}.user-tag{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--paper);background:var(--ink);padding:2px 6px;margin-left:2px}.alt-variant .user-tag{background:var(--purple)}.badge{font-size:13px;line-height:1;background:var(--yellow);border:1.5px solid var(--ink);padding:1px 4px}.alt-variant .badge{background:var(--sky)}.sparkle{display:inline-block;font-family:'Caveat',cursive;font-size:16px;font-weight:600;color:var(--purple);line-height:1;margin-left:auto;animation:sparkAnim 1.6s ease-in-out infinite}.alt-variant .sparkle{color:var(--cobalt)}@keyframes sparkAnim{0%,100%{transform:rotate(-8deg)scale(1);opacity:1}50%{transform:rotate(8deg)scale(1.15);opacity:.65}}.message-text{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:13.5px;line-height:1.45;color:var(--ink);letter-spacing:.005em;position:relative;z-index:1;word-wrap:break-word;word-break:break-word}.message-text a{color:var(--cobalt);text-decoration:underline}.tw-emote{height:1.5em;vertical-align:middle;margin:-2px 1px}.corner-decor{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:linear-gradient(135deg,transparent 50%,var(--ink)50%);pointer-events:none}.live-tag{display:inline-flex;align-items:center;gap:5px;align-self:flex-start;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper);background:var(--ink);padding:4px 9px;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--yellow)}.live-tag .live-dot{width:7px;height:7px;border-radius:50%;background:var(--pink);animation:livePulse 1.4s ease-in-out infinite}@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}

<script>
(function(){'use strict'
var qs=new URLSearchParams(window.location.search);var CHANNEL=qs.get('channel')||'delfin_vt';var MAX_MESSAGES=5;var MSG_LIFETIME=28000;var CHAT_W=380;var BADGES_MAP={broadcaster:"🐬",moderator:"⚔",vip:"♦",subscriber:"★",premium:"♚",turbo:"⚡"};var TAGS_MAP={broadcaster:"host",moderator:"mod",vip:"vip",subscriber:"sub"};var msgCounter=0;var cfg=loadConfig();var uiVisible=true;function defaultCfg(){return{tl:[0,0],tr:[0,0],bl:[0,0],br:[0,0],opacity:100,posX:20,posY:100,scale:100,brightness:100}}function loadConfig(){try{var s=localStorage.getItem('delfin_chat_cfg');return s?Object.assign({},defaultCfg(),JSON.parse(s)):defaultCfg()}catch(e){return defaultCfg()}}function saveConfig(){localStorage.setItem('delfin_chat_cfg',JSON.stringify(cfg));var btn=document.querySelector('.save-btn');if(btn){var t=btn.textContent;btn.textContent='✓ ok';setTimeout(function(){btn.textContent=t},900)}}function resetCorners(){cfg=defaultCfg();applyUIFromCfg();applyWarp()}function toggleUI(){uiVisible=!uiVisible;document.body.classList.toggle('ui-hidden',!uiVisible);if(!uiVisible){document.getElementById('editor-panel').classList.remove('open');document.getElementById('toggle-editor').classList.remove('active')}}
document.addEventListener('keydown',function(e){if(e.key==='h'||e.key==='H')toggleUI()});document.getElementById('toggle-editor').addEventListener('click',function(){var p=document.getElementById('editor-panel');p.classList.toggle('open');document.getElementById('toggle-editor').classList.toggle('active',p.classList.contains('open'))});var container=document.getElementById('chat-container');function getChatHeight(){return Math.max(container.scrollHeight||300,100)}function getSrcCorners(){var w=CHAT_W,h=getChatHeight();return[[0,0],[w,0],[0,h],[w,h]]}function getBasePos(){return{x:cfg.posX,y:cfg.posY,s:cfg.scale/100,w:CHAT_W,h:getChatHeight()}}function getDstCorners(){var p=getBasePos(),bw=p.w*p.s,bh=p.h*p.s,bs=[[p.x,p.y],[p.x+bw,p.y],[p.x,p.y+bh],[p.x+bw,p.y+bh]];return[[bs[0][0]+cfg.tl[0],bs[0][1]+cfg.tl[1]],[bs[1][0]+cfg.tr[0],bs[1][1]+cfg.tr[1]],[bs[2][0]+cfg.bl[0],bs[2][1]+cfg.bl[1]],[bs[3][0]+cfg.br[0],bs[3][1]+cfg.br[1]]]}function solveHomography(s,d){var A=[],b=[];for(var i=0;i<4;i++){var sx=s[i][0],sy=s[i][1],dx=d[i][0],dy=d[i][1];A.push([sx,sy,1,0,0,0,-sx*dx,-sy*dx]);b.push(dx);A.push([0,0,0,sx,sy,1,-sx*dy,-sy*dy]);b.push(dy)}var n=8,M=A.map(function(r,i){return r.concat(b[i])});for(var c=0;c<n;c++){var mr=c;for(var r=c+1;r<n;r++)if(Math.abs(M[r][c])>Math.abs(M[mr][c]))mr=r;var tmp=M[c];M[c]=M[mr];M[mr]=tmp;var pv=M[c][c];if(Math.abs(pv)<1e-12)return[1,0,0,0,1,0,0,0];for(var j=c;j<=n;j++)M[c][j]/=pv;for(var r=0;r<n;r++)if(r!==c){var f=M[r][c];for(var j=c;j<=n;j++)M[r][j]-=f*M[c][j]}}return M.map(function(r){return r[n]})}function homographyToMatrix3d(h){return'matrix3d('+h[0]+','+h[3]+',0,'+h[6]+','+h[1]+','+h[4]+',0,'+h[7]+',0,0,1,0,'+h[2]+','+h[5]+',0,1)'}function applyWarp(){var s=getSrcCorners(),d=getDstCorners(),h=solveHomography(s,d);container.style.transform=homographyToMatrix3d(h);container.style.opacity=cfg.opacity/100;container.style.filter='brightness('+cfg.brightness+'%)';updateHandles()}function updateHandles(){var d=getDstCorners();['h-tl','h-tr','h-bl','h-br'].forEach(function(id,i){var el=document.getElementById(id);if(el){el.style.left=d[i][0]+'px';el.style.top=d[i][1]+'px'}})}(new ResizeObserver(applyWarp)).observe(container);var ws=null,wsReconnect=null,lastMsgTime=Date.now(),connStatus=1;function updateConnUI(){var el=document.getElementById('conn-status');if(!el)return;var txt=el.querySelector('.txt');el.classList.remove('ok','fail');if(connStatus===0){el.classList.add('ok');if(txt)txt.textContent='LIVE'}else if(connStatus===1){if(txt)txt.textContent='CONNECTING'}else{el.classList.add('fail');if(txt)txt.textContent='OFFLINE'}}function connectIRC(){if(ws)try{ws.close()}catch(e){}connStatus=1;updateConnUI();ws=new WebSocket('wss://irc-ws.chat.twitch.tv:443');ws.onopen=function(){ws.send('PASS oauth:ANONYMOUS_ACCESS');ws.send('NICK justinfan'+Math.floor(Math.random()*99999));ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands');ws.send('JOIN #'+CHANNEL);connStatus=0;updateConnUI()};ws.onmessage=function(e){var raw=e.data;if(raw.startsWith('PING')){ws.send('PONG :tmi.twitch.tv');return}if(!raw.includes('PRIVMSG'))return;lastMsgTime=Date.now();var tags={};if(raw.startsWith('@')){raw.substring(1,raw.indexOf(' ')).split(';').forEach(function(t){var p=t.split('=');tags[p[0]]=p[1]})}var m=raw.match(/PRIVMSG #\S+ :(.+)/);if(!m)return;addMessage(tags['display-name']||'user',m[1].trim(),tags['badges']||'',tags['emotes'],tags['color'])};ws.onclose=function(){connStatus=2;updateConnUI();clearTimeout(wsReconnect);wsReconnect=setTimeout(connectIRC,5000)};ws.onerror=function(){connStatus=2;updateConnUI()}}function getBadges(str){return str.split(',').map(function(b){return BADGES_MAP[b.split('/')[0]]}).filter(Boolean)}function getUserTag(str){var p=['broadcaster','moderator','vip','subscriber'];var a=str.split(',').map(function(b){return b.split('/')[0]});for(var i=0;i<p.length;i++){if(a.indexOf(p[i])!==-1)return TAGS_MAP[p[i]]}return null}function parseEmotes(text,emotesStr){if(!emotesStr)return esc(text);var ran
